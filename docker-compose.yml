services:
  minio:
    image: minio/minio:latest
    ports:
      - "9100:9000"   # S3 API  — http://localhost:9100
      - "9101:9001"   # Web UI  — http://localhost:9101
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot container: creates the bucket and makes it publicly readable
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/medusa-store --ignore-existing &&
        mc anonymous set public local/medusa-store &&
        echo 'Bucket ready.'
      "

volumes:
  minio_data:
